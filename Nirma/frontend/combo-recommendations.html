<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Combo Recommendations — RestaurantAI" />
    <title>Combo Recommendations — RestaurantAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet" />

    <style>
        /* ── Reset ─────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Variables ─────────────────────────────────────────────── */
        :root {
            --sidebar-w: 250px;
            --sidebar-w-col: 70px;
            --topbar-h: 64px;

            --bg: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-h: rgba(255, 255, 255, 0.07);
            --sidebar-bg: #0d0d18;
            --topbar-bg: rgba(13, 13, 24, 0.85);
            --border: rgba(255, 255, 255, 0.07);

            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #a855f7;
            --accent-dark: #7c3aed;
            --accent-glow: rgba(168, 85, 247, 0.25);

            --radius: 14px;
            --radius-lg: 18px;
        }

        html {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        /* ── Animations ────────────────────────────────────────────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ══════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════ */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: width .3s cubic-bezier(.4, 0, .2, 1);
        }

        .sidebar.collapsed {
            width: var(--sidebar-w-col);
        }

        .sidebar-header {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: .85rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .sidebar-brand {
            flex: 1;
            overflow: hidden;
        }

        .sidebar-brand .name {
            font-size: .85rem;
            font-weight: 700;
            color: var(--text);
        }

        .sidebar-brand .sub {
            font-size: .65rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .nav-section-label {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #475569;
            padding: .75rem 1.25rem;
            margin-top: .5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem 1.25rem;
            margin: .25rem .6rem;
            border-radius: 9px;
            cursor: pointer;
            transition: all .2s;
            color: var(--muted);
            font-size: .85rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, .06);
            color: var(--text);
        }

        .nav-item.active {
            background: rgba(168, 85, 247, .15);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .nav-label {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            flex-shrink: 0;
        }

        .avatar-info {
            flex: 1;
            overflow: hidden;
        }

        .avatar-info .uname {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text);
        }

        .avatar-info .urole {
            font-size: .65rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* ══════════════════════════════════════════
       TOPBAR
    ══════════════════════════════════════════ */
        .topbar {
            position: fixed;
            top: 0;
            left: var(--sidebar-w);
            right: 0;
            height: var(--topbar-h);
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            z-index: 99;
            backdrop-filter: blur(10px);
            transition: left .3s cubic-bezier(.4, 0, .2, 1);
        }

        .sidebar.collapsed~.main-wrap .topbar {
            left: var(--sidebar-w-col);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-toggle {
            display: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all .2s;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, .1);
            color: var(--text);
        }

        .page-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .page-breadcrumb {
            font-size: .72rem;
            color: var(--muted);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .42rem .85rem;
            font-size: .82rem;
            color: var(--muted);
            transition: all .25s;
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-size: .82rem;
            font-family: 'Inter', sans-serif;
            width: 160px;
        }

        .search-bar input::placeholder {
            color: var(--muted);
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: .95rem;
            cursor: pointer;
            transition: all .2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, .1);
            color: var(--text);
        }

        .topbar-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            cursor: pointer;
            border: 2px solid rgba(168, 85, 247, .3);
        }

        /* ══════════════════════════════════════════
       MAIN AREA
    ══════════════════════════════════════════ */
        .main-wrap {
            margin-left: var(--sidebar-w);
            transition: margin-left .3s cubic-bezier(.4, 0, .2, 1);
        }

        .sidebar.collapsed~.main-wrap {
            margin-left: var(--sidebar-w-col);
        }

        .main-content {
            padding: calc(var(--topbar-h) + 1.75rem) 1.75rem 2rem;
            min-height: 100vh;
        }

        /* ── Section header ────────────────────────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
            animation: fadeUp .5s ease both;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── Card ────────────────────────────────────────────────– */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            animation: fadeUp .5s ease both;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        /* ── Combo Cards Grid ────────────────────────────────────── */
        .combos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
            animation: fadeUp .5s ease both;
        }

        .combo-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), rgba(59, 130, 246, 0.08));
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            transition: all .3s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
            animation: slideInLeft .4s ease both;
        }

        .combo-card:nth-child(2) { animation-delay: 0.05s; }
        .combo-card:nth-child(3) { animation-delay: 0.1s; }
        .combo-card:nth-child(4) { animation-delay: 0.15s; }
        .combo-card:nth-child(5) { animation-delay: 0.2s; }

        .combo-card:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.12), rgba(59, 130, 246, 0.12));
            border-color: rgba(168, 85, 247, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(168, 85, 247, 0.15);
        }

        .combo-card.high-confidence {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .combo-card.high-confidence:hover {
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 12px 32px rgba(34, 197, 94, 0.2);
        }

        .combo-badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            padding: .25rem .6rem;
            border-radius: 4px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .combo-items {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .combo-item {
            flex: 1;
            text-align: center;
        }

        .combo-item-name {
            font-size: .9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: .25rem;
        }

        .combo-item-emoji {
            font-size: 1.8rem;
            margin-bottom: .5rem;
        }

        .combo-plus {
            color: var(--muted);
            font-size: 1.2rem;
            margin: 0 .5rem;
        }

        .combo-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 9px;
            font-size: .8rem;
        }

        .combo-metric {
            text-align: center;
        }

        .combo-metric-label {
            color: var(--muted);
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .25rem;
        }

        .combo-metric-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .combo-metric-value.lift-high {
            color: #4ade80;
        }

        .combo-metric-value.confidence-high {
            color: #3b82f6;
        }

        /* ── Table ──────────────────────────────────────────────– */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
            animation: fadeUp .5s ease both;
        }

        .data-table thead tr {
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #475569;
            padding: .85rem 1rem;
            text-align: left;
        }

        .data-table td {
            padding: 1rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255, 255, 255, .03);
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, .02);
            cursor: pointer;
        }

        .data-table tbody tr:hover td {
            color: var(--text);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table tbody tr.high-confidence-row {
            background: rgba(34, 197, 94, 0.05);
            border-left: 3px solid rgba(34, 197, 94, 0.3);
        }

        .combo-item-text {
            font-weight: 600;
            color: var(--text);
        }

        .metric-badge {
            display: inline-block;
            padding: .35rem .75rem;
            border-radius: 6px;
            font-size: .75rem;
            font-weight: 700;
            text-align: center;
            min-width: 80px;
        }

        .metric-support {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .metric-confidence {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .metric-lift {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* ── Filters ────────────────────────────────────────────– */
        .filters-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
            animation: fadeUp .5s ease both;
            flex-wrap: wrap;
        }

        .filter-input {
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .6rem .85rem;
            color: var(--text);
            font-size: .85rem;
            font-family: 'Inter', sans-serif;
            transition: all .2s;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toggle-buttons {
            display: flex;
            gap: .5rem;
            padding: .35rem;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .toggle-btn {
            padding: .4rem .75rem;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: .8rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all .2s;
            font-weight: 600;
        }

        .toggle-btn:hover {
            color: var(--text);
        }

        .toggle-btn.active {
            background: rgba(168, 85, 247, .2);
            color: var(--accent);
        }

        /* ── Empty state ────────────────────────────────────────– */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            animation: fadeUp .5s ease both;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: .5rem;
        }

        .empty-state-text {
            color: var(--muted);
            font-size: .9rem;
        }

        /* ── Responsive ────────────────────────────────────────– */
        @media (max-width: 900px) {
            :root {
                --sidebar-w: 70px;
            }

            .sidebar-brand,
            .nav-label,
            .avatar-info,
            .nav-section-label {
                opacity: 0;
                pointer-events: none;
            }

            .menu-toggle {
                display: flex;
            }

            .combos-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: calc(var(--topbar-h) + 1rem) 1rem 1.5rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .data-table {
                font-size: .75rem;
            }

            .data-table th,
            .data-table td {
                padding: .6rem;
            }

            .search-bar {
                display: none;
            }

            .filters-bar {
                flex-direction: column;
            }

            .filter-input,
            .toggle-buttons {
                width: 100%;
            }

            .combos-grid {
                grid-template-columns: 1fr;
            }

            .combo-card {
                padding: 1.25rem;
            }

            .combo-items {
                flex-direction: column;
                gap: 0.5rem;
            }

            .combo-plus {
                transform: rotate(90deg);
                margin: .5rem 0;
            }
        }

        .insights-text {
            font-size: .8rem;
            color: var(--muted);
            margin-top: .75rem;
            padding: .75rem;
            background: rgba(0, 0, 0, .2);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
        }
    </style>
<script src="nav.js"></script>
</head>

<body>

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Restaurant Navigation">

        <div class="sidebar-header">
            <div class="sidebar-logo-icon" aria-hidden="true">🍜</div>
            <div class="sidebar-brand">
                <div class="name">Spice Garden</div>
                <div class="sub">Dashboard</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Menu</div>

            <div class="nav-item" onclick="navigate('dashboard')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Dashboard</span>
            </div>

            <div class="nav-item" onclick="navigate('orders')">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Orders</span>
            </div>

            <div class="nav-item" onclick="navigate('menu')">
                <span class="nav-icon">🍱</span>
                <span class="nav-label">Menu Items</span>
            </div>

            <div class="nav-item active" onclick="navigate('combos')">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">Combos</span>
            </div>

            <div class="nav-item" onclick="navigate('intelligence')">
                <span class="nav-icon">💡</span>
                <span class="nav-label">Intelligence</span>
            </div>

            <div class="nav-section-label">Settings</div>

            <div class="nav-item" onclick="navigate('profile')">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </div>

            <div class="nav-item" onclick="navigate('support')">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Support</span>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="avatar" aria-hidden="true">👨‍🍳</div>
            <div class="avatar-info">
                <div class="uname">Rajesh Kumar</div>
                <div class="urole">Owner</div>
            </div>
        </div>

    </aside>

    <!-- ══════════ MAIN WRAP ══════════ -->
    <div class="main-wrap" id="mainWrap">

        <!-- ══════════ TOP NAVBAR ══════════ -->
        <header class="topbar" role="banner">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>
                <div>
                    <div class="page-title">Combo Recommendations</div>
                    <div class="page-breadcrumb">Spice Garden › Analytics › Combos</div>
                </div>
            </div>

            <div class="topbar-right">
                <div class="search-bar">
                    <span style="color:var(--muted)">🔍</span>
                    <input type="text" placeholder="Search combos…" aria-label="Search" onkeyup="filterCombos()" />
                </div>
                <button class="icon-btn" aria-label="Refresh" onclick="refreshPage()">🔄</button>
                <button class="icon-btn" aria-label="Logout" onclick="logout()">🚪</button>
                <div class="topbar-avatar" role="img" aria-label="User avatar">👨‍🍳</div>
            </div>
        </header>

        <!-- ══════════ CONTENT ══════════ -->
        <main class="main-content" id="mainContent" role="main">

            <!-- Section header -->
            <div class="section-header">
                <h1 class="section-title">Combo Recommendations</h1>
                <span style="font-size: .85rem; color: var(--muted);" id="comboCount">0 combos</span>
            </div>

            <!-- Top Recommendations Cards -->
            <div id="combosGridContainer">
                <div class="combos-grid" id="combosGrid">
                    <!-- Filled by JavaScript -->
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-bar">
                <input type="text" class="filter-input" placeholder="Search by item A or B…" id="searchInput" 
                    style="flex: 1; min-width: 200px;" onkeyup="filterTableCombos()" />
                <select class="filter-input" id="confidenceFilter" onchange="filterTableCombos()">
                    <option value="">All Confidence Levels</option>
                    <option value="high">High (≥ 70%)</option>
                    <option value="medium">Medium (50-69%)</option>

        // ═══ CLASSIFY CONFIDENCE ═══════════════════════════════
        function getConfidenceLevel(confidence) {
            if (confidence >= 70) return 'high';
            if (confidence >= 50) return 'medium';
            return 'low';
        }

        // ═══ RENDER COMBO CARDS ════════════════════════════════
        function renderComboCards(combos = comboRecommendations) {
            const grid = document.getElementById('combosGrid');
            const container = document.getElementById('combosGridContainer');

            if (combos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <div class="empty-state-title">No combos found</div>
                        <div class="empty-state-text">Try adjusting your search or filters</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = combos.map(combo => {
                const confidenceLevel = getConfidenceLevel(combo.confidence);
                const isHighConfidence = confidenceLevel === 'high';

                return `
                    <div class="combo-card ${isHighConfidence ? 'high-confidence' : ''}">
                        ${isHighConfidence ? '<div class="combo-badge">⭐ Recommended</div>' : ''}
                        <div class="combo-items">
                            <div class="combo-item">
                                <div class="combo-item-emoji">${combo.itemAEmoji}</div>
                                <div class="combo-item-name">${escapeHtml(combo.itemA)}</div>
                            </div>
                            <div class="combo-plus">+</div>
                            <div class="combo-item">
                                <div class="combo-item-emoji">${combo.itemBEmoji}</div>
                                <div class="combo-item-name">${escapeHtml(combo.itemB)}</div>
                            </div>
                        </div>
                        <div class="combo-metrics">
                            <div class="combo-metric">
                                <div class="combo-metric-label">Support</div>
                                <div class="combo-metric-value">${combo.support}%</div>
                            </div>
                            <div class="combo-metric">
                                <div class="combo-metric-label">Confidence</div>
                                <div class="combo-metric-value confidence-high">${combo.confidence}%</div>
                            </div>
                            <div class="combo-metric">
                                <div class="combo-metric-label">Lift</div>
                                <div class="combo-metric-value lift-high">${combo.lift.toFixed(2)}x</div>
                            </div>
                            <div class="combo-metric">
                                <div class="combo-metric-label">Orders</div>
                                <div class="combo-metric-value">${combo.orders}</div>
                            </div>
                        </div>
                        <div class="insights-text">💡 ${combo.reasoning}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('comboCount').textContent = combos.length + ' combo' + (combos.length !== 1 ? 's' : '');
        }

        // ═══ RENDER TABLE VIEW ═════════════════════════════════
        function renderComboTable(combos = fullCombosData) {
            const tbody = document.getElementById('tableBody');

            if (combos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No combos match your filters</td></tr>';
                document.getElementById('comboCount').textContent = '0 combos';
                return;
            }

            tbody.innerHTML = combos.map(combo => {
                const confidenceLevel = getConfidenceLevel(combo.confidence);
                const rowClass = confidenceLevel === 'high' ? 'high-confidence-row' : '';

                return `
                    <tr class="${rowClass}">
                        <td><span class="combo-item-text">${combo.itemAEmoji} ${escapeHtml(combo.itemA)}</span></td>
                        <td><span class="combo-item-text">${combo.itemBEmoji} ${escapeHtml(combo.itemB)}</span></td>
                        <td><span class="metric-badge metric-support">${combo.support}%</span></td>
                        <td><span class="metric-badge metric-confidence">${combo.confidence}%</span></td>
                        <td><span class="metric-badge metric-lift">${combo.lift.toFixed(2)}x</span></td>
                        <td><span style="font-weight: 600; color: var(--text);">${combo.orders}</span></td>
                    </tr>
                `;
            }).join('');

            document.getElementById('comboCount').textContent = combos.length + ' combo' + (combos.length !== 1 ? 's' : '');
        }

        // ═══ FILTERING ═════════════════════════════════════════
        function filterCombos() {
            const searchVal = document.getElementById('searchInput')?.value.toLowerCase() || '';

            const filtered = comboRecommendations.filter(combo => {
                return !searchVal || 
                    combo.itemA.toLowerCase().includes(searchVal) ||
                    combo.itemB.toLowerCase().includes(searchVal);
            });

            renderComboCards(filtered);
        }

        function filterTableCombos() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const confidenceVal = document.getElementById('confidenceFilter').value;

            const filtered = fullCombosData.filter(combo => {
                const matchSearch = !searchVal || 
                    combo.itemA.toLowerCase().includes(searchVal) ||
                    combo.itemB.toLowerCase().includes(searchVal);

                let matchConfidence = true;
                if (confidenceVal === 'high') matchConfidence = combo.confidence >= 70;
                else if (confidenceVal === 'medium') matchConfidence = combo.confidence >= 50 && combo.confidence < 70;
                else if (confidenceVal === 'low') matchConfidence = combo.confidence < 50;

                return matchSearch && matchConfidence;
            });

            renderComboTable(filtered);
        }

        function toggleViewMode(mode) {
            currentViewMode = mode;

            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const gridContainer = document.getElementById('combosGridContainer');
            const tableContainer = document.getElementById('tableViewContainer');

            if (mode === 'grid') {
                gridContainer.style.display = 'block';
                tableContainer.style.display = 'none';
                renderComboCards(comboRecommendations);
            } else {
                gridContainer.style.display = 'none';
                tableContainer.style.display = 'block';
                renderComboTable(fullCombosData);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');

            const isLocalAdmin = window.location.pathname.includes('admin-');
            const isAdminPath = window.location.pathname.includes('/admin/') || isLocalAdmin;

            const routes = {
                'dashboard': isAdminPath ? 'admin-dashboard.html' : 'restaurant-dashboard.html',
                'restaurants': 'admin-restaurants.html',
                'orders': isAdminPath ? 'admin-dashboard.html' : 'restaurant-orders.html',
                'revenue': 'revenue-intelligence.html',
                'insights': 'price-optimization.html',
                'voice': 'voice-orders.html',
                'combos': 'combo-recommendations.html',
                'users': 'admin-users.html',
                'settings': isAdminPath ? 'admin-settings.html' : 'restaurant-settings.html',
                'menu': 'restaurant-menu.html',
                'customers': 'restaurant-dashboard.html',
                'reports': isAdminPath ? 'admin-settings.html' : 'restaurant-reports.html',
                'profile': isAdminPath ? 'admin-settings.html' : 'restaurant-settings.html',
                'support': isAdminPath ? 'admin-support.html' : 'restaurant-support.html'
            };

            const target = routes[page];
            if (target && target !== '#') {
                window.location.href = target;
            } else {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                try {
                    if (typeof event !== 'undefined' && event && event.currentTarget) {
                        event.currentTarget.classList.add('active');
                    }
                } catch(e) {}
                console.log('Navigating to ' + page + '... (Fallback)');
            }
        }

            if (confirm('Log out?')) {

        function refreshPage() {
            const btn = event.currentTarget;
            btn.style.animation = 'spin .7s linear infinite';
            btn.disabled = true;
            setTimeout(() => {
                btn.style.animation = '';
                btn.disabled = false;
                if (currentViewMode === 'grid') {
                    renderComboCards(comboRecommendations);
                } else {
                    renderComboTable(fullCombosData);
                }
            }, 800);
