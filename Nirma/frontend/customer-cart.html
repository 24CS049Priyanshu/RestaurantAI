<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shopping Cart - Spice Garden" />
    <title>Cart - Spice Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset ─────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Variables ─────────────────────────────────────────────── */
        :root {
            --bg: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-h: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.07);

            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #a855f7;
            --accent-dark: #7c3aed;
            --accent-glow: rgba(168, 85, 247, 0.25);
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;

            --radius: 14px;
            --radius-lg: 18px;
        }

        html {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
        }

        /* ── Animations ────────────────────────────────────────────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
        header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn .3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: .75rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            transition: color .2s;
        }

        .logo:hover {
            color: var(--accent);
        }

        .logo-icon {
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--muted);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            transition: color .2s;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .breadcrumb {
            color: var(--muted);
            font-size: .85rem;
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            transition: color .2s;
        }

        .breadcrumb a:hover {
            color: var(--text);
        }

        /* ══════════════════════════════════════════
       MAIN SECTION
    ══════════════════════════════════════════ */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.75rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            animation: fadeUp .5s ease;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        /* ── Cart Items Section ────────────────────────────────── */
        .cart-items {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            animation: fadeUp .5s ease;
        }

        .cart-items-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .cart-item {
            display: flex;
            gap: 1.25rem;
            padding: 1.25rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            animation: fadeUp .5s ease both;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-icon {
            font-size: 3rem;
            flex-shrink: 0;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: .5rem;
        }

        .item-price-unit {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: .75rem;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: .5rem;
            background: rgba(255, 255, 255, .05);
            padding: .5rem;
            border-radius: 8px;
            width: fit-content;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .qty-btn:hover {
            background: rgba(255, 255, 255, .1);
        }

        .qty-display {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .item-price-right {
            text-align: right;
        }

        .subtotal-label {
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: .25rem;
        }

        .item-subtotal {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--green);
        }

        .remove-btn {
            margin-top: .75rem;
            padding: .4rem .8rem;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, .3);
            background: rgba(239, 68, 68, .1);
            color: var(--red);
            font-size: .75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, .2);
            color: #f87171;
        }

        /* ── Cart Summary ────────────────────────────────────────– */
        .cart-summary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            animation: fadeUp .5s ease both;
        }

        .summary-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: .75rem 0;
            font-size: .9rem;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
        }

        .summary-row:last-of-type {
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .summary-label {
            color: var(--muted);
        }

        .summary-value {
            font-weight: 600;
            color: var(--text);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .total-label {
            font-weight: 700;
            font-size: 1rem;
        }

        .total-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--green);
        }

        .checkout-btn {
            width: 100%;
            padding: .85rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: white;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, .3);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .continue-shopping {
            width: 100%;
            padding: .75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .05);
            color: var(--text);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            margin-top: .75rem;
            font-family: 'Inter', sans-serif;
        }

        .continue-shopping:hover {
            background: rgba(255, 255, 255, .08);
        }

        /* ══════════════════════════════════════════
       EMPTY CART
    ══════════════════════════════════════════ */
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            animation: fadeUp .5s ease;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: .5rem;
        }

        .empty-text {
            color: var(--muted);
            font-size: .95rem;
            margin-bottom: 2rem;
        }

        .empty-btn {
            padding: .75rem 1.5rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: white;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .empty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, .3);
        }

        /* ══════════════════════════════════════════
       NOTIFICATIONS
    ══════════════════════════════════════════ */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--green);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            animation: slideIn .3s ease;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(34, 197, 94, .3);
        }

        /* ── Responsive ────────────────────────────────────────– */
        @media (max-width: 900px) {
            .nav-links {
                display: none;
            }

            .cart-layout {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
                top: auto;
            }
        }

        @media (max-width: 600px) {
            .page-container {
                padding: 1.5rem 1rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .cart-item {
                flex-direction: column;
            }

            .item-controls {
                width: 100%;
                justify-content: space-between;
            }

            .item-price-right {
                text-align: left;
            }

            .item-icon {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- ══════════ HEADER ══════════ -->
    <header>
        <div class="navbar">
            <a href="customer-home.html" class="logo">
                <div class="logo-icon">🍜</div>
                <div style="display: none;">Spice Garden</div>
            </a>

            <div class="breadcrumb">
                <a href="customer-home.html">Home</a> > 
                <a href="customer-menu.html">Menu</a> > 
                <span style="color: var(--accent);">Cart</span>
            </div>

            <nav class="nav-links">
                <a href="customer-home.html" class="nav-link">Home</a>
                <a href="customer-menu.html" class="nav-link">Menu</a>
            </nav>
        </div>
    </header>

    <!-- ══════════ MAIN CONTENT ══════════ -->
    <div class="page-container">
        <h1 class="page-title">🛒 Your Cart</h1>

        <div id="cartContent" class="cart-layout">
            <!-- Filled by JavaScript -->
        </div>

        <div id="emptyCartContent" style="display:none;">
            <div class="empty-cart">
                <div class="empty-icon">🛒</div>
                <div class="empty-title">Your cart is empty</div>
                <div class="empty-text">Looks like you haven't added anything yet. Start exploring our menu!</div>
                <button class="empty-btn" onclick="window.location.href='customer-menu.html'">Browse Menu</button>
            </div>
        </div>
    </div>

    <!-- ══════════ SCRIPT ══════════ -->
    <script>
        "use strict";

        const menuData = [
            { id: 1, name: 'Butter Chicken', price: 280, icon: '🍗', image: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=400&h=300&fit=crop' },
            { id: 2, name: 'Chicken Tikka Masala', price: 300, icon: '🍛', image: 'https://images.unsplash.com/photo-1586190721089-7f5fb84e8c4d?w=400&h=300&fit=crop' },
            { id: 3, name: 'Paneer Butter Masala', price: 260, icon: '🧀' },
            { id: 4, name: 'Tandoori Chicken', price: 260, icon: '🍖' },
            { id: 5, name: 'Rogan Josh', price: 280, icon: '🍖' },
            { id: 6, name: 'Naan', price: 80, icon: '🍞' },
            { id: 7, name: 'Garlic Naan', price: 100, icon: '🌾' },
            { id: 8, name: 'Puri', price: 60, icon: '🥟' },
            { id: 9, name: 'Roti', price: 50, icon: '🥐' },
            { id: 10, name: 'Paratha', price: 90, icon: '🥠' },
            { id: 11, name: 'Biryani', price: 250, icon: '🍚' },
            { id: 12, name: 'Vegetable Biryani', price: 220, icon: '🥘' },
            { id: 13, name: 'Chicken Fried Rice', price: 200, icon: '🍲' },
            { id: 14, name: 'Samosa', price: 60, icon: '📦' },
            { id: 15, name: 'Paneer Tikka', price: 220, icon: '🍢' },
            { id: 16, name: 'Chicken 65', price: 240, icon: '🍗' },
            { id: 17, name: 'Pakora', price: 100, icon: '🍪' },
            { id: 18, name: 'Gulab Jamun', price: 120, icon: '🍡' },
            { id: 19, name: 'Rasgulla', price: 100, icon: '🎂' },
            { id: 20, name: 'Kheer', price: 80, icon: '🍮' },
            { id: 21, name: 'Mango Lassi', price: 90, icon: '🥤' },
            { id: 22, name: 'Chai', price: 40, icon: '☕' },
            { id: 23, name: 'Masala Lassi', price: 80, icon: '🍶' },
            { id: 24, name: 'Raita', price: 50, icon: '🥒' },
            { id: 25, name: 'Papad', price: 40, icon: '💿' },
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function getItemIcon(itemId) {
            const item = menuData.find(i => i.id === itemId);
            return item ? item.icon : '🍽️';
        }

        function renderCart() {
            const cartContent = document.getElementById('cartContent');
            const emptyCartContent = document.getElementById('emptyCartContent');

            if (cart.length === 0) {
                cartContent.style.display = 'none';
                emptyCartContent.style.display = 'block';
                return;
            }

            emptyCartContent.style.display = 'none';
            cartContent.style.display = 'grid';

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = 40;
            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + deliveryFee + tax;

            const cartItemsHtml = cart.map(item => `
                <div class="cart-item">
                    <div class="item-icon">${getItemIcon(item.id)}</div>
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price-unit">₹${item.price} each</div>
                        <div class="item-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <div class="qty-display">${item.quantity}</div>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">✕ Remove</button>
                    </div>
                    <div class="item-price-right">
                        <div class="subtotal-label">Subtotal</div>
                        <div class="item-subtotal">₹${item.price * item.quantity}</div>
                    </div>
                </div>
            `).join('');

            const summaryHtml = `
                <div class="cart-items">
                    <div class="cart-items-title">Items (${cart.reduce((sum, item) => sum + item.quantity, 0)})</div>
                    ${cartItemsHtml}
                </div>

                <div class="cart-summary">
                    <div class="summary-title">Order Summary</div>
                    
                    <div class="summary-row">
                        <span class="summary-label">Subtotal</span>
                        <span class="summary-value">₹${subtotal}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Delivery Fee</span>
                        <span class="summary-value">₹${deliveryFee}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Tax (5%)</span>
                        <span class="summary-value">₹${tax}</span>
                    </div>

                    <div class="summary-total">
                        <span class="total-label">Total</span>
                        <span class="total-value">₹${total}</span>
                    </div>

                    <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
                    <button class="continue-shopping" onclick="window.location.href='customer-menu.html'">Continue Shopping</button>
                </div>
            `;

            cartContent.innerHTML = summaryHtml;
        }

        function updateQuantity(itemId, change) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(itemId);
                } else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    renderCart();
                }
            }
        }

        function removeFromCart(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            showNotification('Item removed from cart');
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            window.location.href = 'customer-checkout.html';
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) + 40 + Math.round(cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 0.05);
            alert(`✓ Order placed successfully!\nTotal: ₹${total}\n\nYour order will be delivered in 30-45 minutes.`);
            
            // Clear cart after checkout
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = '✓ ' + message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>

</body>

</html>
